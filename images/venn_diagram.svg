<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Define filter -->
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Three circles -->
  <circle cx="145" cy="110" r="75" fill="#4A90E2" opacity="0.3" filter="url(#shadow)"/>
  <circle cx="255" cy="110" r="75" fill="#E24A4A" opacity="0.3" filter="url(#shadow)"/>
  <circle cx="200" cy="190" r="75" fill="#50C878" opacity="0.3" filter="url(#shadow)"/>

  <!-- Circle borders -->
  <circle cx="145" cy="110" r="75" fill="none" stroke="#4A90E2" stroke-width="1.5"/>
  <circle cx="255" cy="110" r="75" fill="none" stroke="#E24A4A" stroke-width="1.5"/>
  <circle cx="200" cy="190" r="75" fill="none" stroke="#50C878" stroke-width="1.5"/>

  <!-- Labels inside circles in non-overlapping areas -->
  <text x="105" y="60" font-size="10.5" font-weight="600" fill="#2C3E50" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif">
    <tspan x="105" dy="0">AI Governance</tspan>
    <tspan x="105" dy="12">&amp; Risk</tspan>
  </text>

  <text x="295" y="60" font-size="10.5" font-weight="600" fill="#2C3E50" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif">
    <tspan x="295" dy="0">Production</tspan>
    <tspan x="295" dy="12">Excellence</tspan>
  </text>

  <text x="200" y="248" font-size="10.5" font-weight="600" fill="#2C3E50" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif">
    <tspan x="200" dy="0">Technical</tspan>
    <tspan x="200" dy="12">Innovation</tspan>
  </text>

  <!-- Center intersection -->
  <circle cx="200" cy="137" r="35" fill="#FFD700" opacity="0.45"/>
  <circle cx="200" cy="137" r="35" fill="none" stroke="#F39C12" stroke-width="2"/>

  <!-- Center text -->
  <text x="200" y="129" font-size="9.5" font-weight="700" fill="#2C3E50" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif">
    <tspan x="200" dy="0">Leading</tspan>
    <tspan x="200" dy="11">Trustworthy AI</tspan>
    <tspan x="200" dy="11">at Scale</tspan>
  </text>
</svg>
